<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Médicos</title>
    <link rel="stylesheet" href="../medicos/medico.css">
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <a href="../portal/portal.html"><img src="../img/logoHospital.webp" alt="Logo Hospital" class="logo"></a>

    <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="paciente.html">Pacientes</a></li>
        <li class="active">Médicos</li>
        <li><a href="">Citas</a></li>
    </ul>
</aside>

<!-- HEADER -->
<header class="header">
    <input type="text" placeholder="Buscar médico...">
    <div class="user">Admin</div>
</header>

<!-- MAIN -->
<main class="main">

    <h1>Gestión de Médicos</h1>

    <!-- FORMULARIO -->
    <section class="form-section">
        <h2>Registrar / Editar Médico</h2>

        <form id="formMedico" action="../medicos/guardarMedi.php" method="post">

            <input type="text" placeholder="ID Médico" id="idMedico" name="idMedico">
            <input type="text" placeholder="Nombre" id="nombre" name="nombre">
            <input type="text" placeholder="Apellido" id="apellido" name="apellido">
            <input type="text" placeholder="Teléfono" id="telefono" name="telefono">

            <select id="estado" name="estado">
                <option value="">Estado</option>
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
            </select>

            <select id="tipoMedico" name="tipoMedico">
                <option value="">Tipo de Médico</option>
                <option value="general">General</option>
                <option value="especialista">Especialista</option>
            </select>


            <div class="botones">
                <button type="submit" >Guardar</button>
                <button type="button" >cancelar</button>
            </div>

        </form>
    </section>

    <section class="form-section" id="buscarMedi">
    <h2>Consultar Médico</h2>
    <div>
        <input type="text" id="buscarId" placeholder="Ingrese ID del médico">

        <div class="botones">
            <button type="button" onclick="buscarMedi()">Buscar</button>
            <button type="button" onclick="limpiarBusqueda()">Limpiar</button>
        </div>
    </div>

    <div id="resultadoMedico" class="resultado-paciente"></div>
</section>

    <section class="table-section" >
        <h2>Lista de Médicos</h2>
            <div id="tablaMedicos">
        <p >No hay Médicos
        </p>
    </div>
        
    </section>

</main>

<script src="../medicos/medico.js"></script>
</body>
</html>
