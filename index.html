<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital San Vicente de Paúl</title>
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <h2>Clínica</h2>
    <ul>
        <li class="active">Dashboard</li>
        <li>Pacientes</li>
        <li>Médicos</li>
        <li>Citas</li>
    </ul>
</aside>

<!-- HEADER -->
<header class="header">
    <input type="text" placeholder="Buscar...">
    <div class="user">Admin</div>
</header>

<!-- MAIN -->
<main class="main">

    <h1>Bienvenido</h1>

    <!-- CARDS -->
    <section class="cards">
        <div class="card">
            <h3>Pacientes</h3>
            <p>120</p>
        </div>
        <div class="card">
            <h3>Citas</h3>
            <p>45</p>
        </div>
        <div class="card">
            <h3>Médicos</h3>
            <p>10</p>
        </div>
    </section>

    <!-- TABLE -->
    <section class="table-section">
        <h2>Próximas citas</h2>
        <table>
            <thead>
                <tr>
                    <th>Paciente</th>
                    <th>Hora</th>
                    <th>Médico</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Juan Pérez</td>
                    <td>10:00</td>
                    <td>Dr. López</td>
                    <td>Confirmada</td>
                </tr>
                <tr>
                    <td>Ana Gómez</td>
                    <td>11:00</td>
                    <td>Dra. Ruiz</td>
                    <td>Pendiente</td>
                </tr>
            </tbody>
        </table>
    </section>

</main>

</body>
</html>
