<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asignación de Citas</title>
    <link rel="stylesheet" href="../asignacionCitas/asignacion.css">
</head>
<body>

<div class="contenedor">

    <h2>Asignación de Citas</h2>

    <!-- FILTROS -->
   <input type="text" id="buscarPaciente" placeholder="Ingrese ID paciente">

<select id="estadoCita">
    <option value="">--Seleccione estado--</option>
    <option value="confirmada">Confirmada</option>
    <option value="cancelada">Cancelada</option>
</select>

<button onclick="buscar()">Buscar</button>
<button onclick="limpiar()">Limpiar</button>
    <!-- BUSCADOR -->
    <div class="buscador">
        <input type="text" id="buscarPaciente" placeholder="Ingrese ID del paciente">
        <button type="button" onclick="buscar()">Buscar</button>
        <button type="button" onclick="limpiar()">Limpiar</button>
    </div>

    <!-- TABLA -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Cita / Fecha</th>
                <th>Paciente</th>
                <th>Nombre</th>
                <th>Estado / Acción</th>
            </tr>
        </thead>
        <tbody id="tablaCitas"></tbody>
    </table>

</div>

<script src="../asignacionCitas/asignacion.js"></script>
</body>
</html>
