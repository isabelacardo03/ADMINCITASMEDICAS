<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
     <link rel="shortcut icon" href="../img/favicon.png" type="image/x-icon">
    <title>Asignación de Citas</title>
    <link rel="stylesheet" href="../asignacionCitas/asignacion.css">
</head>
<body>

<main class="main">

    <div class="titulo">
        Asignación de Citas
    </div>

    <div class="volver">
        <a href="../portal/portal.html"> ← Volver al portal </a>
    </div>

    <div class="form-section">
    <h2>Asignar Cita</h2>

    <div class="form-grid">

        <div class="campo">
            <label>ID Paciente</label>
            <input type="text" id="buscarPaciente" placeholder="Ingrese ID paciente">
        </div>

        <div class="campo">
            <label>Médico</label>
            <select id="selectMedico" onchange="cargarAgendas()">
                <option value="">--Seleccione médico--</option>
            </select>
        </div>

        <div class="campo">
            <label>Agenda</label>
            <select id="selectAgenda">
                <option value="">--Seleccione agenda--</option>
            </select>
        </div>

        <div class="campo">
            <label>Estado</label>
            <select id="estadoCita">
                <option value="">--Seleccione estado--</option>
                <option value="confirmada">Confirmada</option>
                <option value="cancelada">Cancelada</option>
            </select>
        </div>

    </div>

    <div class="botones">
        <button onclick="buscar()">Buscar</button>
        <button onclick="limpiar()" type="button">Limpiar</button>
    </div>

</div>
    <!-- FILTROS -->
    <div class="form-section">
        <h2>Filtrar Citas</h2>

        <div class="filtros">
            <button onclick="cargarCitas('')" class="btn-filtro">Todas</button>
            <button onclick="cargarCitas('confirmada')" class="btn-filtro confirmar">Confirmadas</button>
            <button onclick="cargarCitas('cancelada')" class="btn-filtro cancelar">Canceladas</button>
        </div>
    </div>

    <!-- TABLA -->
    <div class="table-section">
        <h2>Listado de Citas</h2>

        <div class="tablaMedicos">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cita</th>
                        <th>Identificación del Paciente</th>
                        <th>Nombre del paciente</th>
                        <th>Estado de la cita</th>
                    </tr>
                </thead>
                <tbody id="tablaCitas"></tbody>
            </table>
        </div>
    </div>

</main>

<script src="../asignacionCitas/asignacion.js"></script>
</body>
</html>
