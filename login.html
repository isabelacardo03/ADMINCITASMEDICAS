<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Hospital San Vicente de Paul</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
</head>
<body>

<div class="container">
    <div class="card">
        <div class="barra-color">
            <div class="logo">
                <h1>Hospital San Vicente de Paul</h1>
            </div>
            <img src="img/favicon.png" width="40">
        </div>

        <div class="section-formulario">
            <h2>Bienvenido</h2>
            <p class="subtitulo">Ingresa tus credenciales para acceder.</p>

            <form action="login.php" method="POST">
                <label>Correo electrónico</label>
                <input type="email" name="email" placeholder="correo@electronico.com" required>

                <div class="contraseña">
                    <label>Contraseña</label>
                    <a href="#">¿Olvido su contraseña?</a>
                </div>
                <input type="password" name="password" placeholder="••••••••" required>

                <button type="submit" class="boton-iniciar">Iniciar sesión</button>
            </form>

            <p class="texto-iniciar">¿No tienes cuenta?<a href="registro.html"> Regístrate</a></p>
        </div>
    </div>
</div>

</body>
</html>
