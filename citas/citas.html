<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
     <link rel="shortcut icon" href="../img/favicon.png" type="image/x-icon">
    <title>Gestión de Citas</title>
    <link rel="stylesheet" href="../citas/style.css">
</head>
<body>

    <h1>Gestión de Citas</h1>

    <div class="volver">
        <a href="../portal/portal.html">← Volver al portal</a>
    </div>

    <section id="formCitas">
        <h2>Registrar / Modificar Cita</h2>

        <form id="citaForm" action="../citas/guardarCita.php" method="post">
            <input type="hidden" id="citaEditandoId" name="citaEditandoId" value="">

            <div>
                <input type="text" id="medicoId" name="idMedico" placeholder="ID Médico" required>
            </div>

            <div>
                <input type="text" id="medicoNombre" name="nombre" placeholder="Nombre Médico" required>
            </div>

            <div>
                <input type="datetime-local" id="fecha" name="fechaHora" required>
            </div>

            <div>
                <select id="estadoCita" name="estado" required>
                    <option value="">Estado</option>
                    <option value="confirmada">Confirmada</option>
                    <option value="cancelada">Cancelada</option>
                </select>
            </div>

            <div>
                <select id="tipoCita" name="tipoCita" required>
                    <option value="">Tipo de cita</option>
                    <option value="general">General</option>
                    <option value="especializada">Especializada</option>
                </select>
            </div>

            <div class="botones">
                <button type="submit">Guardar</button>
                <button type="reset">Limpiar</button>
            </div>
        </form>
    </section>

    <section id="tablaCitas">
        <h2>Lista de Citas</h2>
        <div id="citasTabla"></div>
    </section>
    <script src="../citas/citas.js"></script>
</body>
</html>
