<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Pacientes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="main">

        <h1 class="titulo">Gestión de Pacientes</h1>

        <div class="volver">
            <a href="../portal/portal.html">← Volver al portal</a>
        </div>

        <div class="form-row">

            <section class="form-section">
                <h2>Registrar / Editar Paciente</h2>

                <form id="formPaciente" action="guardar.php" method="post">
                    <input type="hidden" name="tipo" value="paciente">
                    <input type="text" placeholder="Identificación" id="identificacion" name="idPaciente">
                    
                    <select id="tipoDocumento" name="tipoIdenti">
                        <option value="">Tipo de documento</option>
                        <option value='CC'>CC</option>
                        <option value='TI'>TI</option>
                        <option value='CE'>CE</option>
                    </select>

                    <input type="text" placeholder="Nombre" id="nombre" name="nombre">
                    <input type="text" placeholder="Apellido" id="apellido" name="apellido">
                    <input type="date" id="fechaNacimiento" name="fechaNacimiento">
                    <input type="text" placeholder="Dirección" id="direccion" name="direccion">
                    <input type="text" placeholder="Teléfono" id="telefono" name="telefono">

                    <select id="estado" name="estado">
                        <option value="">Estado</option>
                        <option value='activo'>Activo</option>
                        <option value='inactivo'>Inactivo</option>
                    </select>

                    <div class="botones">
                        <button type="submit">Guardar</button>
                        <button type="button">Cancelar</button>
                    </div>
                </form>
            </section>

            <section class="form-section" id="buscarPacientes">
                <h2>Consultar Paciente</h2>
                <div>
                    <input type="text" id="buscarId" placeholder="Ingrese ID del paciente" style="margin-bottom: 15px;">

                    <div class="botones">
                        <button type="button" onclick="buscarPaciente()">Buscar</button>
                        <button type="button">Limpiar</button>
                    </div>
                </div>

                <div id="resultadoPaciente" class="resultado-paciente"></div>
            </section>

        </div> <section class="table-section">
            <h2>Lista de Pacientes</h2>
            <div id="tablaPacientes" class="tablaMedicos">
                <p>No hay pacientes registrados actualmente.</p>
            </div>
        </section>

    </main>

    <script src="scripts.js"></script>
</body>

</html>
